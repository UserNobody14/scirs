# cbindgen configuration for SciRS2 mobile FFI
# Generates C headers for iOS (Swift) and Android (JNI)

language = "C"
header = "/* SciRS2 v0.2.0 - Mobile Platform FFI */\n/* Copyright: COOLJAPAN OU (Team KitaSan) */\n/* Auto-generated by cbindgen - DO NOT EDIT */\n"
include_guard = "SCIRS2_FFI_H"
autogen_warning = "/* Warning: Auto-generated file. Do not edit manually. */"
pragma_once = true
include_version = true
namespace = "scirs2"
sys_includes = []
includes = []
no_includes = false
after_includes = ""

[export]
include = ["SciFfiError", "SciFfiVector", "SciFfiMatrix", "SciBatteryMode", "SciThermalState"]
exclude = []
prefix = "Sci"
item_types = ["globals", "enums", "structs", "unions", "typedefs", "opaque", "functions", "constants"]

[export.rename]
"SciFfiError" = "SciError"
"SciFfiVector" = "SciVector"
"SciFfiMatrix" = "SciMatrix"

[enum]
rename_variants = "ScreamingSnakeCase"
add_sentinel = false
must_use = true

[struct]
rename_fields = "SnakeCase"
derive_constructor = false
derive_eq = false
derive_neq = false
derive_lt = false
derive_lte = false
derive_gt = false
derive_gte = false

[fn]
rename_args = "SnakeCase"
args = "Auto"
sort_by = "None"

[defines]
"target_os = ios" = "SCIRS2_IOS"
"target_os = android" = "SCIRS2_ANDROID"
"target_arch = aarch64" = "SCIRS2_AARCH64"

[parse]
parse_deps = false
clean = false
extra_bindings = []
