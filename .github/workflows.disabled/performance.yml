name: Performance Regression Detection

on:
  push:
    branches: [ "master", "main", "0.2.0" ]
  pull_request:
    branches: [ "master", "main", "0.2.0" ]
  schedule:
    # Run twice daily at 6 AM and 6 PM UTC
    - cron: '0 6,18 * * *'
  workflow_dispatch:
    inputs:
      baseline_ref:
        description: 'Baseline commit/branch for comparison'
        required: false
        default: 'master'
      profile:
        description: 'Performance testing profile'
        required: false
        default: 'comprehensive'
        type: choice
        options:
          - quick
          - comprehensive
          - stress

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  # Performance benchmarking matrix
  performance-benchmarks:
    name: Benchmarks (${{ matrix.os }}, ${{ matrix.profile }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        profile: [quick, comprehensive]
        include:
          # Additional stress testing on Ubuntu
          - os: ubuntu-latest
            profile: stress

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for baseline comparison

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-bench-${{ matrix.os }}"

      - name: Install criterion
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-criterion

      - name: Configure CPU for stable benchmarks (Linux)
        if: runner.os == 'Linux'
        run: |
          # Disable CPU frequency scaling for consistent results
          echo 'GOVERNOR=performance' | sudo tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor || true

      - name: Setup benchmark environment
        run: |
          mkdir -p benchmark_results
          mkdir -p benchmark_baselines

          # Set profile-specific parameters
          case "${{ matrix.profile }}" in
            quick)
              echo "CRITERION_SAMPLE_SIZE=10" >> $GITHUB_ENV
              echo "CRITERION_MEASUREMENT_TIME=5" >> $GITHUB_ENV
              ;;
            comprehensive)
              echo "CRITERION_SAMPLE_SIZE=100" >> $GITHUB_ENV
              echo "CRITERION_MEASUREMENT_TIME=10" >> $GITHUB_ENV
              ;;
            stress)
              echo "CRITERION_SAMPLE_SIZE=500" >> $GITHUB_ENV
              echo "CRITERION_MEASUREMENT_TIME=30" >> $GITHUB_ENV
              ;;
          esac

      - name: Run workspace benchmarks
        run: |
          # Run all benchmarks with criterion
          cargo bench \
            --workspace \
            --all-features \
            -- --verbose --save-baseline current

          # Export benchmark results
          if [ -d "target/criterion" ]; then
            cp -r target/criterion benchmark_results/
          fi

      - name: Run v0.2.0 performance validation benchmark
        if: matrix.profile == 'comprehensive'
        run: |
          # Run the v0.2.0 validation benchmark
          cargo bench \
            --package scirs2-core \
            --bench v020_performance_validation \
            --all-features || echo "v0.2.0 validation benchmark not found"

      - name: Fetch baseline for comparison
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        run: |
          # Checkout baseline branch
          BASELINE="${{ inputs.baseline_ref }}"
          if [ -z "$BASELINE" ]; then
            BASELINE="master"
          fi

          git fetch origin "$BASELINE"
          git checkout "origin/$BASELINE"

          # Run baseline benchmarks
          cargo bench \
            --workspace \
            --all-features \
            -- --save-baseline baseline

          # Switch back to current branch
          git checkout -

      - name: Compare performance
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        run: |
          # Compare current vs baseline
          cargo bench \
            --workspace \
            --all-features \
            -- --baseline baseline --save-baseline current

      - name: Analyze performance regression
        run: |
          # Create Python script for regression analysis
          cat > analyze_benchmarks.py << 'EOF'
import json
import os
import sys
from pathlib import Path

def analyze_criterion_results(criterion_dir):
    """Analyze Criterion benchmark results for regressions"""
    results = {
        'benchmarks': [],
        'regressions': [],
        'improvements': [],
        'unchanged': []
    }

    # Look for benchmark results
    criterion_path = Path(criterion_dir)
    if not criterion_path.exists():
        print(f"Criterion directory not found: {criterion_dir}")
        return results

    # Find all benchmark groups
    for group_dir in criterion_path.iterdir():
        if not group_dir.is_dir():
            continue

        # Check for estimates.json
        current_estimates = group_dir / "current" / "estimates.json"
        baseline_estimates = group_dir / "baseline" / "estimates.json"

        if current_estimates.exists():
            try:
                with open(current_estimates) as f:
                    current_data = json.load(f)

                benchmark_name = group_dir.name
                current_mean = current_data.get('mean', {}).get('point_estimate', 0)

                result = {
                    'name': benchmark_name,
                    'current_mean_ns': current_mean,
                    'current_mean_ms': current_mean / 1_000_000,
                }

                # Compare with baseline if exists
                if baseline_estimates.exists():
                    with open(baseline_estimates) as f:
                        baseline_data = json.load(f)

                    baseline_mean = baseline_data.get('mean', {}).get('point_estimate', 0)
                    result['baseline_mean_ns'] = baseline_mean
                    result['baseline_mean_ms'] = baseline_mean / 1_000_000

                    if baseline_mean > 0:
                        change_pct = ((current_mean - baseline_mean) / baseline_mean) * 100
                        result['change_percent'] = change_pct

                        # Classify as regression/improvement/unchanged
                        if change_pct > 5:  # >5% slower = regression
                            results['regressions'].append(result)
                        elif change_pct < -5:  # >5% faster = improvement
                            results['improvements'].append(result)
                        else:
                            results['unchanged'].append(result)

                results['benchmarks'].append(result)

            except Exception as e:
                print(f"Error processing {group_dir}: {e}")

    return results

def generate_report(results):
    """Generate markdown performance report"""
    report = []
    report.append("# Performance Benchmark Results\n")

    total_benchmarks = len(results['benchmarks'])
    regression_count = len(results['regressions'])
    improvement_count = len(results['improvements'])

    report.append(f"**Total Benchmarks**: {total_benchmarks}\n")
    report.append(f"**Regressions**: {regression_count}\n")
    report.append(f"**Improvements**: {improvement_count}\n")
    report.append(f"**Unchanged**: {len(results['unchanged'])}\n\n")

    if results['regressions']:
        report.append("## ⚠️ Performance Regressions\n\n")
        report.append("| Benchmark | Baseline | Current | Change |\n")
        report.append("|-----------|----------|---------|--------|\n")

        for reg in results['regressions']:
            report.append(
                f"| {reg['name']} | "
                f"{reg.get('baseline_mean_ms', 0):.3f}ms | "
                f"{reg['current_mean_ms']:.3f}ms | "
                f"+{reg.get('change_percent', 0):.1f}% |\n"
            )
        report.append("\n")

    if results['improvements']:
        report.append("## ✅ Performance Improvements\n\n")
        report.append("| Benchmark | Baseline | Current | Change |\n")
        report.append("|-----------|----------|---------|--------|\n")

        for imp in results['improvements']:
            report.append(
                f"| {imp['name']} | "
                f"{imp.get('baseline_mean_ms', 0):.3f}ms | "
                f"{imp['current_mean_ms']:.3f}ms | "
                f"{imp.get('change_percent', 0):.1f}% |\n"
            )

    return ''.join(report)

if __name__ == '__main__':
    criterion_dir = sys.argv[1] if len(sys.argv) > 1 else 'target/criterion'
    results = analyze_criterion_results(criterion_dir)

    # Generate report
    report = generate_report(results)
    print(report)

    # Write to file
    with open('performance_report.md', 'w') as f:
        f.write(report)

    # Write JSON for further processing
    with open('performance_results.json', 'w') as f:
        json.dump(results, f, indent=2)

    # Exit with error if regressions found
    if results['regressions']:
        print(f"\n❌ {len(results['regressions'])} performance regression(s) detected!")
        sys.exit(1)
    else:
        print("\n✅ No performance regressions detected")
        sys.exit(0)
EOF

          python3 analyze_benchmarks.py benchmark_results/criterion || true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.os }}-${{ matrix.profile }}
          path: |
            benchmark_results/
            performance_report.md
            performance_results.json
          retention-days: 90

      - name: Check for performance regression
        run: |
          if [ -f "performance_results.json" ]; then
            # Check if any regressions were found
            REGRESSIONS=$(python3 -c "import json; data=json.load(open('performance_results.json')); print(len(data.get('regressions', [])))")

            if [ "$REGRESSIONS" -gt 0 ]; then
              echo "::error::Performance regression detected: $REGRESSIONS benchmark(s) degraded"
              exit 1
            fi
          fi

  # GPU performance testing (when available)
  gpu-benchmarks:
    name: GPU Benchmarks (CUDA)
    runs-on: ubuntu-latest
    # Only run on specific branches to avoid excessive GPU usage
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/0.2.0'
    # Note: Requires self-hosted runner with CUDA support
    # Disable for now, enable when GPU runner is available
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for CUDA availability
        run: |
          if command -v nvidia-smi &> /dev/null; then
            echo "CUDA available"
            nvidia-smi
          else
            echo "CUDA not available, skipping GPU benchmarks"
            exit 0
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run GPU benchmarks
        if: success()
        run: |
          # Run GPU-specific benchmarks
          cargo bench \
            --package scirs2-linalg \
            --features cuda \
            --bench gpu_benchmarks || echo "GPU benchmarks not available"

  # Memory profiling
  memory-profiling:
    name: Memory Profiling
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: |
          cargo build --workspace --release --all-features

      - name: Run memory profiling
        run: |
          mkdir -p memory_profiles

          # Profile key benchmarks for memory usage
          for bench in target/release/examples/*; do
            if [ -x "$bench" ]; then
              BENCH_NAME=$(basename "$bench")
              echo "Profiling $BENCH_NAME..."

              timeout 60 valgrind \
                --tool=massif \
                --massif-out-file="memory_profiles/${BENCH_NAME}.massif" \
                "$bench" || true
            fi
          done

      - name: Generate memory reports
        run: |
          # Parse massif output
          for massif_file in memory_profiles/*.massif; do
            if [ -f "$massif_file" ]; then
              ms_print "$massif_file" > "${massif_file}.txt" || true
            fi
          done

      - name: Upload memory profiles
        uses: actions/upload-artifact@v4
        with:
          name: memory-profiles
          path: memory_profiles/
          retention-days: 30

  # Performance summary and reporting
  performance-summary:
    name: Performance Summary
    runs-on: ubuntu-latest
    needs: [performance-benchmarks, gpu-benchmarks, memory-profiling]
    if: always()

    steps:
      - name: Download all benchmark results
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-results-*
          path: all_benchmarks/

      - name: Aggregate performance results
        run: |
          cat > performance_summary.md << 'EOF'
# SciRS2 v0.2.0 Performance Summary

**Generated**: $(date -u)
**Commit**: ${{ github.sha }}
**Branch**: ${{ github.ref_name }}

## Job Results

- Performance Benchmarks: ${{ needs.performance-benchmarks.result }}
- GPU Benchmarks: ${{ needs.gpu-benchmarks.result }}
- Memory Profiling: ${{ needs.memory-profiling.result }}

## Summary

EOF

          # Check for any performance_report.md files
          find all_benchmarks -name "performance_report.md" -exec cat {} \; >> performance_summary.md || true

          cat >> performance_summary.md << 'EOF'

---

*See individual artifacts for detailed benchmark results*
EOF

      - name: Upload performance summary
        uses: actions/upload-artifact@v4
        with:
          name: performance-summary
          path: performance_summary.md
          retention-days: 90

      - name: Comment PR with performance results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let comment = '## ⚡ Performance Benchmark Results\n\n';

            if (fs.existsSync('performance_summary.md')) {
              const summary = fs.readFileSync('performance_summary.md', 'utf8');
              comment += summary;
            } else {
              comment += 'Performance results not available.\n';
            }

            comment += '\n\n---\n';
            comment += '*Detailed benchmark results are available in workflow artifacts.*\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Check overall performance status
        run: |
          if [[ "${{ needs.performance-benchmarks.result }}" != "success" ]]; then
            echo "::error::Performance benchmarks failed or found regressions"
            exit 1
          fi

          echo "✅ All performance checks passed!"
