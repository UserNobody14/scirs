name: WASM Build and Test

on:
  push:
    branches: [ master, develop, 0.2.0 ]
    paths:
      - 'scirs2-wasm/**'
      - 'scirs2-core/**'
      - '.github/workflows/wasm.yml'
  pull_request:
    branches: [ master, develop ]
    paths:
      - 'scirs2-wasm/**'
      - 'scirs2-core/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build WASM
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - wasm32-unknown-unknown
        build-type:
          - debug
          - release

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-wasm-${{ matrix.build-type }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM (Debug)
        if: matrix.build-type == 'debug'
        run: |
          cd scirs2-wasm
          wasm-pack build --target bundler --dev

      - name: Build WASM (Release)
        if: matrix.build-type == 'release'
        run: |
          cd scirs2-wasm
          wasm-pack build --target bundler --release

      - name: Check WASM size
        if: matrix.build-type == 'release'
        run: |
          cd scirs2-wasm/pkg
          ls -lh *.wasm
          echo "WASM file size:"
          du -h *.wasm

      - name: Upload WASM artifacts
        if: matrix.build-type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: wasm-${{ matrix.target }}
          path: scirs2-wasm/pkg/

  test:
    name: Test WASM
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser:
          - firefox
          - chrome

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-test-wasm-${{ hashFiles('**/Cargo.lock') }}

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install Chrome
        if: matrix.browser == 'chrome'
        uses: browser-actions/setup-chrome@latest

      - name: Install Firefox
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-firefox@latest

      - name: Run WASM tests (${{ matrix.browser }})
        run: |
          cd scirs2-wasm
          wasm-pack test --headless --${{ matrix.browser }}

  test-node:
    name: Test WASM in Node.js
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Run WASM tests in Node.js
        run: |
          cd scirs2-wasm
          wasm-pack test --node

  optimize:
    name: Optimize WASM with wasm-opt
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install wasm-opt
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen

      - name: Build WASM
        run: |
          cd scirs2-wasm
          wasm-pack build --target bundler --release

      - name: Optimize with wasm-opt
        run: |
          cd scirs2-wasm/pkg
          wasm-opt -Oz -o scirs2_wasm_bg_opt.wasm scirs2_wasm_bg.wasm

      - name: Compare sizes
        run: |
          cd scirs2-wasm/pkg
          echo "Original WASM size:"
          du -h scirs2_wasm_bg.wasm
          echo "Optimized WASM size:"
          du -h scirs2_wasm_bg_opt.wasm
          echo "Size reduction:"
          original=$(stat -c%s scirs2_wasm_bg.wasm)
          optimized=$(stat -c%s scirs2_wasm_bg_opt.wasm)
          reduction=$((100 - (optimized * 100 / original)))
          echo "${reduction}%"

      - name: Upload optimized WASM
        uses: actions/upload-artifact@v4
        with:
          name: wasm-optimized
          path: scirs2-wasm/pkg/scirs2_wasm_bg_opt.wasm

  build-simd:
    name: Build WASM with SIMD
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM with SIMD
        run: |
          cd scirs2-wasm
          RUSTFLAGS='-C target-feature=+simd128' wasm-pack build --target bundler --release -- --features simd

      - name: Check SIMD WASM
        run: |
          cd scirs2-wasm/pkg
          ls -lh *.wasm

      - name: Upload SIMD WASM
        uses: actions/upload-artifact@v4
        with:
          name: wasm-simd
          path: scirs2-wasm/pkg/

  benchmark:
    name: WASM Performance Benchmarks
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: |
          cd scirs2-wasm
          wasm-pack build --target nodejs --release

      - name: Run benchmarks
        run: |
          cd scirs2-wasm
          node examples/node_example.js

  docs:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build docs
        run: |
          cd scirs2-wasm
          cargo doc --target wasm32-unknown-unknown --no-deps --all-features

      - name: Upload docs
        uses: actions/upload-artifact@v4
        with:
          name: wasm-docs
          path: target/wasm32-unknown-unknown/doc/
