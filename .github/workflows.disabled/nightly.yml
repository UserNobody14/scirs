name: Nightly Comprehensive Testing

on:
  schedule:
    # Run at 2 AM UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  RUST_BACKTRACE: full
  CARGO_TERM_COLOR: always

jobs:
  # Extended testing with all features
  extended-testing:
    name: Extended Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy, miri

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run extended tests
        run: |
          # Run all tests including ignored ones
          cargo +nightly nextest run \
            --workspace \
            --all-features \
            --run-ignored all \
            --no-fail-fast

      - name: Run property-based tests
        run: |
          # Run with more iterations for comprehensive testing
          QUICKCHECK_TESTS=10000 \
          PROPTEST_CASES=10000 \
          cargo +nightly test \
            --workspace \
            --all-features \
            property_ || true

      - name: Run stress tests
        run: |
          # Run memory-intensive and stress tests
          cargo +nightly test \
            --workspace \
            --all-features \
            --release \
            stress_ || true

  # Fuzzing with cargo-fuzz
  fuzzing:
    name: Fuzz Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Initialize fuzz targets
        run: |
          # Initialize fuzzing for core modules if not exists
          for module in scirs2-core scirs2-linalg scirs2-fft; do
            if [ -d "$module" ] && [ ! -d "$module/fuzz" ]; then
              cd "$module"
              cargo +nightly fuzz init || true
              cd ..
            fi
          done

      - name: Run fuzz tests
        run: |
          # Run fuzzing on critical modules (5 minutes each)
          for module in scirs2-core scirs2-linalg scirs2-fft; do
            if [ -d "$module/fuzz" ]; then
              echo "Fuzzing $module..."
              cd "$module"

              # List fuzz targets
              TARGETS=$(cargo +nightly fuzz list 2>/dev/null || echo "")

              for target in $TARGETS; do
                echo "Running fuzz target: $target"
                timeout 300 cargo +nightly fuzz run "$target" \
                  -- -max_total_time=300 \
                  -timeout=10 || true
              done

              cd ..
            fi
          done

  # Miri for undefined behavior detection
  miri:
    name: Miri (Undefined Behavior Detection)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust nightly with Miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Miri
        run: cargo +nightly miri setup

      - name: Run Miri tests
        run: |
          # Run Miri on core modules (can be slow)
          for crate in scirs2-core; do
            if [ -d "$crate" ]; then
              echo "Running Miri on $crate..."
              cargo +nightly miri test \
                -p "$crate" \
                --lib \
                --no-default-features || true
            fi
          done

  # Cross-compilation matrix
  cross-compilation:
    name: Cross-Compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
          - riscv64gc-unknown-linux-gnu
          - x86_64-pc-windows-gnu
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - wasm32-unknown-unknown
          - wasm32-wasi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Cross-compile
        run: |
          if [[ "${{ matrix.target }}" == wasm32-* ]]; then
            cargo build --target ${{ matrix.target }} --no-default-features
          else
            cross build --target ${{ matrix.target }} --no-default-features
          fi

  # Documentation validation
  doc-validation:
    name: Documentation Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Validate documentation
        env:
          RUSTDOCFLAGS: "-D warnings -D rustdoc::broken_intra_doc_links -D missing_docs"
        run: |
          cargo doc --workspace --all-features --no-deps

      - name: Check README files exist
        run: |
          # Ensure all crates have README files
          for crate_dir in scirs2-*; do
            if [ -d "$crate_dir" ]; then
              if [ ! -f "$crate_dir/README.md" ]; then
                echo "::warning::Missing README.md in $crate_dir"
              fi
            fi
          done

      - name: Install mdbook
        run: |
          cargo install mdbook || true

      - name: Build documentation book
        run: |
          if [ -f "book.toml" ]; then
            mdbook build
          fi

  # Security audit (comprehensive)
  security-audit:
    name: Comprehensive Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install security tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny,cargo-geiger

      - name: Run cargo-audit
        run: |
          cargo audit --deny warnings

      - name: Run cargo-deny
        run: |
          cargo deny check || true

      - name: Check unsafe code with cargo-geiger
        run: |
          cargo geiger --all-features > unsafe_code_report.txt || true
          cat unsafe_code_report.txt

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-reports
          path: |
            unsafe_code_report.txt
          retention-days: 90

  # Memory leak detection
  memory-leaks:
    name: Memory Leak Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build test binaries
        run: |
          cargo build --workspace --all-features --tests

      - name: Run memory leak tests
        run: |
          mkdir -p memory_leak_reports

          # Test executables for memory leaks
          for test_bin in target/debug/deps/*-*; do
            if [ -x "$test_bin" ] && [ ! -d "$test_bin" ]; then
              BIN_NAME=$(basename "$test_bin")
              echo "Testing $BIN_NAME for memory leaks..."

              timeout 60 valgrind \
                --leak-check=full \
                --show-leak-kinds=all \
                --track-origins=yes \
                --error-exitcode=1 \
                --log-file="memory_leak_reports/${BIN_NAME}.log" \
                "$test_bin" --test-threads=1 || true
            fi
          done

      - name: Upload memory leak reports
        uses: actions/upload-artifact@v4
        with:
          name: memory-leak-reports
          path: memory_leak_reports/
          retention-days: 90

  # Dependency update check
  dependency-updates:
    name: Dependency Update Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-outdated
        run: |
          cargo install cargo-outdated || true

      - name: Check for outdated dependencies
        run: |
          cargo outdated --workspace --root-deps-only > outdated_deps.txt || true
          cat outdated_deps.txt

      - name: Generate dependency tree
        run: |
          cargo tree --workspace --all-features > dependency_tree.txt

      - name: Upload dependency reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-reports
          path: |
            outdated_deps.txt
            dependency_tree.txt
          retention-days: 90

  # Platform-specific edge cases
  platform-edge-cases:
    name: Platform Edge Cases (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-20.04, ubuntu-22.04, macos-12, macos-13, windows-2019, windows-2022]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run platform-specific tests
        run: |
          cargo test --workspace --all-features

  # Large dataset testing
  large-dataset-tests:
    name: Large Dataset Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run large dataset tests
        run: |
          # Run tests with large data (if marked with specific attribute)
          cargo test \
            --workspace \
            --all-features \
            --release \
            large_dataset || true

  # Nightly report
  nightly-report:
    name: Nightly Report
    runs-on: ubuntu-latest
    needs:
      - extended-testing
      - fuzzing
      - miri
      - cross-compilation
      - doc-validation
      - security-audit
      - memory-leaks
      - dependency-updates
      - platform-edge-cases
      - large-dataset-tests
    if: always()

    steps:
      - name: Generate nightly report
        run: |
          cat > nightly_report.md << EOF
# SciRS2 v0.2.0 Nightly Testing Report

**Date**: $(date -u)
**Commit**: ${{ github.sha }}
**Branch**: ${{ github.ref_name }}

## Test Results

| Job | Status |
|-----|--------|
| Extended Testing | ${{ needs.extended-testing.result }} |
| Fuzzing | ${{ needs.fuzzing.result }} |
| Miri (UB Detection) | ${{ needs.miri.result }} |
| Cross-Compilation | ${{ needs.cross-compilation.result }} |
| Documentation | ${{ needs.doc-validation.result }} |
| Security Audit | ${{ needs.security-audit.result }} |
| Memory Leaks | ${{ needs.memory-leaks.result }} |
| Dependency Updates | ${{ needs.dependency-updates.result }} |
| Platform Edge Cases | ${{ needs.platform-edge-cases.result }} |
| Large Dataset Tests | ${{ needs.large-dataset-tests.result }} |

## Summary

EOF

          # Check overall status
          FAILED_JOBS=0

          for result in "${{ needs.extended-testing.result }}" \
                       "${{ needs.fuzzing.result }}" \
                       "${{ needs.miri.result }}" \
                       "${{ needs.cross-compilation.result }}" \
                       "${{ needs.doc-validation.result }}" \
                       "${{ needs.security-audit.result }}" \
                       "${{ needs.memory-leaks.result }}" \
                       "${{ needs.dependency-updates.result }}" \
                       "${{ needs.platform-edge-cases.result }}" \
                       "${{ needs.large-dataset-tests.result }}"; do
            if [[ "$result" == "failure" ]]; then
              ((FAILED_JOBS++))
            fi
          done

          if [ $FAILED_JOBS -eq 0 ]; then
            echo "✅ **All nightly tests passed!**" >> nightly_report.md
          else
            echo "❌ **$FAILED_JOBS job(s) failed. Please review.**" >> nightly_report.md
          fi

          echo "" >> nightly_report.md
          echo "---" >> nightly_report.md
          echo "*Automated nightly testing for SciRS2 v0.2.0*" >> nightly_report.md

      - name: Upload nightly report
        uses: actions/upload-artifact@v4
        with:
          name: nightly-test-report
          path: nightly_report.md
          retention-days: 90

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Nightly Build Failure - ${new Date().toISOString().split('T')[0]}`;
            const body = `## Nightly Build Failure Report

**Date**: ${new Date().toISOString()}
**Run ID**: ${{ github.run_id }}
**Commit**: ${{ github.sha }}

### Failed Jobs

Review the workflow logs for detailed information:
[Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

### Action Items

- [ ] Review failure logs
- [ ] Check for regressions
- [ ] Validate security findings
- [ ] Update dependencies if needed

---

*This issue was automatically created by the nightly testing workflow.*`;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['nightly-failure', 'automated', 'priority-high']
            });
