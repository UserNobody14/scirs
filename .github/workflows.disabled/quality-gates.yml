name: Quality Gates

on:
  push:
    branches: [ "master", "main", "0.2.0" ]
  pull_request:
    branches: [ "master", "main", "0.2.0" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Zero clippy warnings enforcement
  clippy:
    name: Clippy (Zero Warnings)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy (zero warnings)
        run: |
          # Enforce zero warnings across workspace
          cargo clippy --workspace --all-targets --all-features -- \
            -D warnings \
            -D clippy::unwrap_used \
            -W clippy::expect_used \
            -D clippy::panic \
            -D clippy::unimplemented \
            -D clippy::todo

      - name: Run Clippy on tests (zero warnings)
        run: |
          cargo clippy --workspace --tests --all-features -- -D warnings

      - name: Run Clippy on benches (zero warnings)
        run: |
          cargo clippy --workspace --benches --all-features -- -D warnings

  # Zero compiler warnings enforcement
  compiler-warnings:
    name: Compiler Warnings (Zero Warnings)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build with warnings as errors
        env:
          RUSTFLAGS: "-D warnings"
        run: |
          cargo build --workspace --all-targets --all-features

  # Code formatting check
  formatting:
    name: Code Formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: |
          cargo fmt --all -- --check

  # Security audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run security audit
        run: |
          cargo audit --deny warnings

  # Dependency checks
  dependency-checks:
    name: Dependency Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Check dependencies with cargo-deny
        run: |
          # Create cargo-deny configuration if not exists
          if [ ! -f "deny.toml" ]; then
            cat > deny.toml << 'EOF'
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
yanked = "deny"
notice = "warn"
ignore = []

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
]
deny = []
copyleft = "warn"
allow-osi-fsf-free = "both"
default = "deny"
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = ["cool-japan"]
EOF
          fi

          cargo deny check

      - name: Check for outdated dependencies
        run: |
          # Install cargo-outdated
          cargo install cargo-outdated || true

          # Check for outdated dependencies (informational only)
          cargo outdated --workspace --root-deps-only || true

  # Unsafe code audit
  unsafe-audit:
    name: Unsafe Code Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-geiger
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-geiger

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Audit unsafe code usage
        run: |
          # Generate unsafe code report
          cargo geiger --all-features --output-format GitHubMarkdown > unsafe_report.md || true

          # Display the report
          cat unsafe_report.md || true

      - name: Upload unsafe code report
        uses: actions/upload-artifact@v4
        with:
          name: unsafe-code-report
          path: unsafe_report.md
          retention-days: 30

  # License compliance check
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-license
        run: |
          cargo install cargo-license || true

      - name: Generate license report
        run: |
          cargo license --all-features --json > licenses.json || true
          cargo license --all-features > licenses.txt || true

      - name: Check COOLJAPAN Pure Rust Policy compliance
        run: |
          # Check for C/Fortran dependencies
          echo "Checking for non-Pure-Rust dependencies..."

          # Flag any system dependencies (should be feature-gated)
          if cargo tree --all-features | grep -i "openblas\|lapack\|blas\|fortran"; then
            echo "❌ ERROR: OpenBLAS/LAPACK dependencies found - violates Pure Rust Policy"
            echo "Use OxiBLAS instead (oxiblas crates)"
            exit 1
          fi

          if cargo tree --all-features | grep -i "bincode"; then
            echo "❌ ERROR: bincode dependency found - use oxicode instead"
            exit 1
          fi

          if cargo tree --all-features | grep "rustfft" | grep -v "oxifft"; then
            echo "⚠️ WARNING: rustfft found - consider migrating to OxiFFT"
          fi

          echo "✅ Pure Rust Policy compliance check passed"

      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: |
            licenses.json
            licenses.txt
          retention-days: 30

  # Code complexity analysis
  complexity:
    name: Code Complexity Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install tokei for statistics
        uses: taiki-e/install-action@v2
        with:
          tool: tokei

      - name: Generate code statistics
        run: |
          tokei --output json > tokei_stats.json
          tokei

      - name: Upload code statistics
        uses: actions/upload-artifact@v4
        with:
          name: code-statistics
          path: tokei_stats.json
          retention-days: 30

  # Dead code detection
  dead-code:
    name: Dead Code Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust nightly (for cargo-udeps)
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-udeps
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-udeps

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Check for unused dependencies
        run: |
          cargo +nightly udeps --all-features --workspace || true

  # Minimum Supported Rust Version (MSRV) check
  msrv:
    name: MSRV Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust 1.75.0 (MSRV for 2021 edition)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.75.0"

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Check MSRV compatibility
        run: |
          cargo check --workspace --all-features

  # Quality gates summary
  quality-gates-summary:
    name: Quality Gates Summary
    runs-on: ubuntu-latest
    needs:
      - clippy
      - compiler-warnings
      - formatting
      - security-audit
      - dependency-checks
      - unsafe-audit
      - license-check
      - complexity
      - dead-code
      - msrv
    if: always()

    steps:
      - name: Generate quality report
        run: |
          cat > quality_report.md << EOF
# SciRS2 v0.2.0 Quality Gates Report

**Generated**: $(date -u)
**Commit**: ${{ github.sha }}
**Branch**: ${{ github.ref_name }}

## Quality Checks Status

| Check | Status |
|-------|--------|
| Clippy (Zero Warnings) | ${{ needs.clippy.result }} |
| Compiler Warnings | ${{ needs.compiler-warnings.result }} |
| Code Formatting | ${{ needs.formatting.result }} |
| Security Audit | ${{ needs.security-audit.result }} |
| Dependency Checks | ${{ needs.dependency-checks.result }} |
| Unsafe Code Audit | ${{ needs.unsafe-audit.result }} |
| License Compliance | ${{ needs.license-check.result }} |
| Code Complexity | ${{ needs.complexity.result }} |
| Dead Code Detection | ${{ needs.dead-code.result }} |
| MSRV Check | ${{ needs.msrv.result }} |

## Summary

EOF

          # Check if all passed
          if [[ "${{ needs.clippy.result }}" == "success" && \
                "${{ needs.compiler-warnings.result }}" == "success" && \
                "${{ needs.formatting.result }}" == "success" && \
                "${{ needs.security-audit.result }}" == "success" && \
                "${{ needs.dependency-checks.result }}" == "success" ]]; then
            echo "✅ **All critical quality gates passed!**" >> quality_report.md
          else
            echo "❌ **Some quality gates failed. Please review the details above.**" >> quality_report.md
            exit 1
          fi

      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gates-report
          path: quality_report.md
          retention-days: 30

      - name: Comment PR with quality status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('quality_report.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
