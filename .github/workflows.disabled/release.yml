name: Release Automation

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.2.0)'
        required: true
      dry_run:
        description: 'Dry run (do not publish)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Validate release readiness
  validate-release:
    name: Validate Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Validate workspace version consistency
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Check root Cargo.toml
          ROOT_VERSION=$(grep -oP '^\s*version\s*=\s*"\K[^"]+' Cargo.toml | head -1)
          echo "Root workspace version: $ROOT_VERSION"

          # Validate version matches
          if [ "$ROOT_VERSION" != "$VERSION" ]; then
            echo "::error::Root workspace version ($ROOT_VERSION) does not match release version ($VERSION)"
            exit 1
          fi

          # Check all crate versions
          for crate_dir in scirs2-*; do
            if [ -d "$crate_dir" ] && [ -f "$crate_dir/Cargo.toml" ]; then
              CRATE_VERSION=$(grep -oP '^\s*version\s*=\s*"\K[^"]+' "$crate_dir/Cargo.toml" | head -1)

              if [ ! -z "$CRATE_VERSION" ] && [ "$CRATE_VERSION" != "$VERSION" ]; then
                echo "::warning::$crate_dir version ($CRATE_VERSION) differs from release version ($VERSION)"
              fi
            fi
          done

      - name: Validate CHANGELOG
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          if [ ! -f "CHANGELOG.md" ]; then
            echo "::warning::CHANGELOG.md not found"
          else
            # Check if version is documented in changelog
            if ! grep -q "## \[$VERSION\]" CHANGELOG.md && ! grep -q "## $VERSION" CHANGELOG.md; then
              echo "::warning::Version $VERSION not found in CHANGELOG.md"
            fi
          fi

      - name: Run comprehensive tests
        run: |
          cargo test --workspace --all-features --no-fail-fast

      - name: Check documentation
        run: |
          cargo doc --workspace --all-features --no-deps

      - name: Dry-run publish
        run: |
          # Test that all crates can be published
          for crate_dir in scirs2-*; do
            if [ -d "$crate_dir" ] && [ -f "$crate_dir/Cargo.toml" ]; then
              echo "Checking $crate_dir for publish..."
              cd "$crate_dir"
              cargo publish --dry-run || echo "::warning::$crate_dir cannot be published"
              cd ..
            fi
          done

  # Build release artifacts
  build-artifacts:
    name: Build Release Artifacts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: validate-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: scirs2-linux-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: scirs2-linux-x86_64-musl
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: scirs2-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: scirs2-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: scirs2-windows-x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: |
          cargo build --workspace --release --target ${{ matrix.target }} --all-features

      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          VERSION="${{ needs.validate-release.outputs.version || github.ref_name }}"

          # Copy release binaries
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/*.exe artifacts/ || true
          else
            cp target/${{ matrix.target }}/release/scirs2* artifacts/ || true
          fi

          # Create archive
          cd artifacts
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "../${{ matrix.artifact_name }}-${VERSION}.zip" *
          else
            tar czf "../${{ matrix.artifact_name }}-${VERSION}.tar.gz" *
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}-*.tar.gz
            ${{ matrix.artifact_name }}-*.zip
          retention-days: 90

  # Generate documentation
  build-documentation:
    name: Build Documentation
    runs-on: ubuntu-latest
    needs: validate-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Generate API documentation
        run: |
          cargo doc --workspace --all-features --no-deps

      - name: Create documentation archive
        run: |
          VERSION="${{ needs.validate-release.outputs.version || github.ref_name }}"
          tar czf "scirs2-docs-${VERSION}.tar.gz" -C target doc/

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: scirs2-docs-*.tar.gz
          retention-days: 90

  # Generate changelog
  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: validate-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for changelog

      - name: Generate changelog from commits
        run: |
          VERSION="${{ needs.validate-release.outputs.version || github.ref_name }}"

          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          cat > "RELEASE_CHANGELOG_${VERSION}.md" << EOF
# SciRS2 v${VERSION} Release Notes

**Release Date**: $(date -u +"%Y-%m-%d")

## What's Changed

EOF

          if [ ! -z "$PREV_TAG" ]; then
            echo "Changes since $PREV_TAG:" >> "RELEASE_CHANGELOG_${VERSION}.md"
            echo "" >> "RELEASE_CHANGELOG_${VERSION}.md"

            # Group commits by type
            git log ${PREV_TAG}..HEAD --pretty=format:"%s" | while read commit; do
              echo "- $commit" >> "RELEASE_CHANGELOG_${VERSION}.md"
            done
          else
            echo "Initial release" >> "RELEASE_CHANGELOG_${VERSION}.md"
          fi

          cat >> "RELEASE_CHANGELOG_${VERSION}.md" << 'EOF'

## Installation

Add to your `Cargo.toml`:

```toml
[dependencies]
scirs2 = "VERSION"
```

## Documentation

- [API Documentation](https://docs.rs/scirs2)
- [GitHub Repository](https://github.com/cool-japan/scirs)

## Contributors

Thanks to all contributors who made this release possible!

---

**Full Changelog**: https://github.com/cool-japan/scirs/compare/PREV_TAG...vVERSION
EOF

          # Replace placeholders
          sed -i.bak "s/VERSION/${VERSION}/g" "RELEASE_CHANGELOG_${VERSION}.md"
          if [ ! -z "$PREV_TAG" ]; then
            sed -i.bak "s/PREV_TAG/${PREV_TAG}/g" "RELEASE_CHANGELOG_${VERSION}.md"
          fi

          cat "RELEASE_CHANGELOG_${VERSION}.md"

      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: RELEASE_CHANGELOG_*.md
          retention-days: 90

  # Create GitHub release
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate-release
      - build-artifacts
      - build-documentation
      - generate-changelog
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: SciRS2 ${{ github.ref_name }}
          body_path: release-artifacts/changelog/RELEASE_CHANGELOG_*.md
          files: |
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish to crates.io (with dry-run option)
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: create-release
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Publish crates to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # IMPORTANT: Per user instructions, NEVER actually publish
          # Always use --dry-run until explicitly told to publish

          DRY_RUN="--dry-run"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "false" ]; then
            echo "::warning::Manual publish requested but per policy using --dry-run"
            echo "::warning::Remove --dry-run flag only when explicitly instructed by user"
          fi

          # Publish order (dependencies first)
          PUBLISH_ORDER=(
            "scirs2-core"
            "scirs2-linalg"
            "scirs2-fft"
            "scirs2-signal"
            "scirs2-integrate"
            "scirs2-interpolate"
            "scirs2-stats"
            "scirs2-special"
            "scirs2-optimize"
            "scirs2-sparse"
            "scirs2-spatial"
            "scirs2-ndimage"
            "scirs2-cluster"
            "scirs2-io"
            "scirs2-datasets"
            "scirs2-neural"
            "scirs2-graph"
            "scirs2-transform"
            "scirs2-metrics"
            "scirs2-text"
            "scirs2-vision"
            "scirs2-series"
            "scirs2-autograd"
            "scirs2"
          )

          for crate in "${PUBLISH_ORDER[@]}"; do
            if [ -d "$crate" ]; then
              echo "Publishing $crate..."
              cd "$crate"
              cargo publish $DRY_RUN --allow-dirty || echo "::warning::Failed to publish $crate"
              cd ..
              # Wait between publishes to allow crates.io to update
              sleep 30
            fi
          done

  # Deploy documentation to GitHub Pages
  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: create-release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Generate documentation
        run: |
          cargo doc --workspace --all-features --no-deps

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/doc
          cname: scirs.cooljapan.dev

  # Release summary
  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs:
      - validate-release
      - build-artifacts
      - build-documentation
      - generate-changelog
      - create-release
      - publish-crates
      - deploy-docs
    if: always()

    steps:
      - name: Generate release summary
        run: |
          cat > release_summary.md << 'EOF'
# SciRS2 Release Summary

## Release Jobs Status

| Job | Status |
|-----|--------|
| Validate Release | ${{ needs.validate-release.result }} |
| Build Artifacts | ${{ needs.build-artifacts.result }} |
| Build Documentation | ${{ needs.build-documentation.result }} |
| Generate Changelog | ${{ needs.generate-changelog.result }} |
| Create Release | ${{ needs.create-release.result }} |
| Publish Crates | ${{ needs.publish-crates.result }} |
| Deploy Docs | ${{ needs.deploy-docs.result }} |

## Summary

EOF

          if [[ "${{ needs.create-release.result }}" == "success" ]]; then
            echo "✅ **Release created successfully!**" >> release_summary.md
          else
            echo "❌ **Release process encountered issues.**" >> release_summary.md
          fi

      - name: Upload release summary
        uses: actions/upload-artifact@v4
        with:
          name: release-summary
          path: release_summary.md
          retention-days: 90
