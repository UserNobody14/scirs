name: Test Coverage

on:
  push:
    branches: [ "master", "main", "0.2.0" ]
  pull_request:
    branches: [ "master", "main", "0.2.0" ]
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Code coverage with cargo-tarpaulin
  coverage-tarpaulin:
    name: Coverage (Tarpaulin)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      - name: Generate coverage with tarpaulin
        run: |
          cargo tarpaulin \
            --workspace \
            --all-features \
            --timeout 1200 \
            --out xml \
            --out lcov \
            --out html \
            --engine llvm \
            --follow-exec \
            --post-test-delay 10 \
            --exclude-files 'benches/*' 'tests/*' 'examples/*' \
            --output-dir coverage/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/cobertura.xml,./coverage/lcov.info
          flags: unittests
          name: scirs2-coverage
          fail_ci_if_error: true
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Generate coverage summary
        run: |
          # Parse coverage percentage from XML
          if [ -f "coverage/cobertura.xml" ]; then
            COVERAGE=$(grep -oP 'line-rate="\K[0-9.]+' coverage/cobertura.xml | head -1)
            COVERAGE_PCT=$(echo "$COVERAGE * 100" | bc -l | xargs printf "%.2f")

            cat > coverage_summary.md << EOF
# Test Coverage Report

**Generated**: $(date -u)
**Commit**: ${{ github.sha }}
**Branch**: ${{ github.ref_name }}

## Overall Coverage: ${COVERAGE_PCT}%

### Coverage Details

See the detailed HTML report in artifacts for per-file coverage.

### Coverage Trend

| Metric | Value |
|--------|-------|
| Line Coverage | ${COVERAGE_PCT}% |
| Branch Coverage | N/A |
| Function Coverage | N/A |

EOF

            echo "Coverage: ${COVERAGE_PCT}%"
          fi

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/
            coverage_summary.md
          retention-days: 30

      - name: Check coverage threshold
        run: |
          if [ -f "coverage/cobertura.xml" ]; then
            COVERAGE=$(grep -oP 'line-rate="\K[0-9.]+' coverage/cobertura.xml | head -1)
            COVERAGE_PCT=$(echo "$COVERAGE * 100" | bc -l | xargs printf "%.0f")

            # Set minimum coverage threshold
            MIN_COVERAGE=70

            if [ "$COVERAGE_PCT" -lt "$MIN_COVERAGE" ]; then
              echo "❌ Coverage ${COVERAGE_PCT}% is below minimum threshold ${MIN_COVERAGE}%"
              exit 1
            else
              echo "✅ Coverage ${COVERAGE_PCT}% meets minimum threshold ${MIN_COVERAGE}%"
            fi
          fi

  # Alternative coverage with llvm-cov
  coverage-llvm:
    name: Coverage (LLVM)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage with llvm-cov
        run: |
          cargo llvm-cov \
            --workspace \
            --all-features \
            --lcov \
            --output-path lcov-llvm.info

          cargo llvm-cov report \
            --workspace \
            --all-features \
            --html \
            --output-dir coverage-llvm/

      - name: Upload LLVM coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-llvm-report
          path: |
            lcov-llvm.info
            coverage-llvm/
          retention-days: 30

  # Per-crate coverage analysis
  per-crate-coverage:
    name: Per-Crate Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Generate per-crate coverage
        run: |
          mkdir -p per-crate-coverage

          # Generate coverage for each major crate
          for crate in scirs2-core scirs2-linalg scirs2-fft scirs2-signal \
                       scirs2-integrate scirs2-stats scirs2-special \
                       scirs2-sparse scirs2-ndimage scirs2-neural; do
            if [ -d "$crate" ]; then
              echo "Generating coverage for $crate..."

              cargo llvm-cov \
                -p "$crate" \
                --all-features \
                --html \
                --output-dir "per-crate-coverage/$crate" || true

              cargo llvm-cov report \
                -p "$crate" \
                --all-features > "per-crate-coverage/${crate}_summary.txt" || true
            fi
          done

      - name: Create per-crate summary
        run: |
          cat > per-crate-coverage/README.md << 'EOF'
# Per-Crate Coverage Summary

This directory contains coverage reports for individual crates in the SciRS2 workspace.

## Crate Coverage

| Crate | Coverage |
|-------|----------|
EOF

          for summary in per-crate-coverage/*_summary.txt; do
            if [ -f "$summary" ]; then
              CRATE=$(basename "$summary" _summary.txt)
              # Extract coverage percentage if available
              COVERAGE=$(grep -oP '\d+\.\d+%' "$summary" | head -1 || echo "N/A")
              echo "| $CRATE | $COVERAGE |" >> per-crate-coverage/README.md
            fi
          done

      - name: Upload per-crate coverage
        uses: actions/upload-artifact@v4
        with:
          name: per-crate-coverage
          path: per-crate-coverage/
          retention-days: 30

  # Coverage comment on PR
  coverage-comment:
    name: Coverage Comment
    runs-on: ubuntu-latest
    needs: [coverage-tarpaulin, coverage-llvm]
    if: github.event_name == 'pull_request'

    steps:
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Comment PR with coverage
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let comment = '## 📊 Test Coverage Report\n\n';

            if (fs.existsSync('coverage/coverage_summary.md')) {
              const summary = fs.readFileSync('coverage/coverage_summary.md', 'utf8');
              comment += summary;
            } else {
              comment += 'Coverage report not available.\n';
            }

            comment += '\n\n---\n';
            comment += '*Coverage reports are available in the workflow artifacts.*\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Coverage summary
  coverage-summary:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: [coverage-tarpaulin, coverage-llvm, per-crate-coverage]
    if: always()

    steps:
      - name: Generate final summary
        run: |
          cat > coverage_final_summary.md << 'EOF'
# SciRS2 v0.2.0 Coverage Summary

**Status**: ${{ needs.coverage-tarpaulin.result }}

## Coverage Methods

- **Tarpaulin**: ${{ needs.coverage-tarpaulin.result }}
- **LLVM-COV**: ${{ needs.coverage-llvm.result }}
- **Per-Crate**: ${{ needs.per-crate-coverage.result }}

## Next Steps

1. Review coverage reports in artifacts
2. Identify uncovered code paths
3. Add tests for critical uncovered sections
4. Monitor coverage trends over time

---

*Generated by SciRS2 CI/CD Pipeline*
EOF

      - name: Upload final summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-final-summary
          path: coverage_final_summary.md
          retention-days: 30
