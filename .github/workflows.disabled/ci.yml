name: CI

on:
  push:
    branches: [ "master", "main", "0.2.0", "feature/*" ]
  pull_request:
    branches: [ "master", "main", "0.2.0" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Ensure OxiBLAS is used (Pure Rust Policy)
  CARGO_FEATURES_OXIBLAS: 1

jobs:
  # Multi-platform testing matrix
  test-matrix:
    name: Test (${{ matrix.os }}, Rust ${{ matrix.rust }}, ${{ matrix.features }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, beta]
        features: ["default", "all-features", "no-default-features"]
        include:
          # Additional nightly testing on Ubuntu only
          - os: ubuntu-latest
            rust: nightly
            features: "all-features"
          # Test specific feature combinations
          - os: ubuntu-latest
            rust: stable
            features: "gpu-cuda"
            name: "GPU CUDA Support"
          - os: ubuntu-latest
            rust: stable
            features: "gpu-opencl"
            name: "GPU OpenCL Support"
          - os: macos-latest
            rust: stable
            features: "gpu-metal"
            name: "GPU Metal Support"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-${{ matrix.os }}-${{ matrix.rust }}"
          shared-key: "${{ matrix.features }}"

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      # No system dependencies needed - Pure Rust Policy (OxiBLAS instead of OpenBLAS)

      - name: Configure feature flags
        id: features
        shell: bash
        run: |
          case "${{ matrix.features }}" in
            "default")
              echo "flags=" >> $GITHUB_OUTPUT
              ;;
            "all-features")
              echo "flags=--all-features" >> $GITHUB_OUTPUT
              ;;
            "no-default-features")
              echo "flags=--no-default-features" >> $GITHUB_OUTPUT
              ;;
            "gpu-cuda")
              echo "flags=--features cuda" >> $GITHUB_OUTPUT
              ;;
            "gpu-opencl")
              echo "flags=--features opencl" >> $GITHUB_OUTPUT
              ;;
            "gpu-metal")
              echo "flags=--features metal" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "flags=" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Check compilation
        run: cargo check --workspace ${{ steps.features.outputs.flags }}

      - name: Build workspace
        run: cargo build --workspace ${{ steps.features.outputs.flags }}

      - name: Run tests with nextest
        run: |
          cargo nextest run --workspace ${{ steps.features.outputs.flags }} \
            --no-fail-fast \
            --test-threads=4 \
            --profile ci

      - name: Run doctests
        run: cargo test --doc --workspace ${{ steps.features.outputs.flags }}

      - name: Check examples
        if: matrix.features == 'all-features'
        run: |
          # Build all examples to ensure they compile
          cargo build --examples ${{ steps.features.outputs.flags }}

  # Cross-compilation validation
  cross-compile:
    name: Cross-Compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
          - x86_64-pc-windows-gnu
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - wasm32-unknown-unknown
          - wasm32-wasi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Cross-compile check
        shell: bash
        run: |
          # WASM targets require no-default-features
          if [[ "${{ matrix.target }}" == wasm32-* ]]; then
            cargo build --target ${{ matrix.target }} --no-default-features
          else
            # Use cross for other targets
            cross build --target ${{ matrix.target }} --no-default-features --workspace
          fi

  # Feature combination testing
  feature-combinations:
    name: Feature Combinations
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - "scirs2-core,scirs2-linalg"
          - "scirs2-core,scirs2-stats"
          - "scirs2-core,scirs2-signal,scirs2-fft"
          - "scirs2-neural,scirs2-autograd"
          - "scirs2-ndimage,scirs2-vision"
          - "scirs2-linalg,scirs2-sparse"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Test feature combination
        run: |
          # Test that feature combinations work together
          cargo check --features "${{ matrix.features }}"
          cargo test --features "${{ matrix.features }}" --lib

  # Minimal build verification (ensure no bloat)
  minimal-build:
    name: Minimal Build Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build with minimal features
        run: |
          # Ensure each crate builds with no default features
          for crate in scirs2-core scirs2-linalg scirs2-fft scirs2-signal \
                       scirs2-integrate scirs2-stats scirs2-special \
                       scirs2-sparse scirs2-ndimage scirs2-neural; do
            if [ -d "$crate" ]; then
              echo "Building $crate with no default features..."
              cargo build -p "$crate" --no-default-features
            fi
          done

      - name: Verify no_std compatibility (where applicable)
        run: |
          # Test no_std builds for core components
          for crate in scirs2-core; do
            if [ -d "$crate" ]; then
              echo "Checking no_std for $crate..."
              cargo build -p "$crate" --no-default-features --features no_std || true
            fi
          done

  # Integration testing
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-matrix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run integration tests
        run: |
          # Run workspace integration tests
          cargo nextest run --workspace --test '*integration*' --no-fail-fast

  # Documentation validation
  docs:
    name: Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Check documentation
        env:
          RUSTDOCFLAGS: "-D warnings -D rustdoc::broken_intra_doc_links"
        run: |
          cargo doc --workspace --all-features --no-deps

  # Final status check
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs:
      - test-matrix
      - cross-compile
      - feature-combinations
      - minimal-build
      - integration-tests
      - docs
    if: always()

    steps:
      - name: Check all jobs
        run: |
          RESULTS=(
            "${{ needs.test-matrix.result }}"
            "${{ needs.cross-compile.result }}"
            "${{ needs.feature-combinations.result }}"
            "${{ needs.minimal-build.result }}"
            "${{ needs.integration-tests.result }}"
            "${{ needs.docs.result }}"
          )

          for result in "${RESULTS[@]}"; do
            if [[ "$result" != "success" ]]; then
              echo "CI failed: One or more jobs did not succeed"
              exit 1
            fi
          done

          echo "✅ All CI checks passed!"
