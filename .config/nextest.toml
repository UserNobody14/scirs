# cargo-nextest configuration for SciRS2
# https://nexte.st/book/configuration.html

[store]
# Directory where nextest stores its metadata
dir = "target/.nextest"

[profile.default]
# Default test execution settings
retries = 0
fail-fast = false
failure-output = "immediate"
success-output = "never"
status-level = "all"

# Test execution
test-threads = "num-cpus"
slow-timeout = { period = "60s", terminate-after = 2 }

[profile.ci]
# CI-specific settings for faster feedback
retries = 1
fail-fast = false
failure-output = "immediate-final"
success-output = "never"
status-level = "all"

# More lenient timeouts for CI runners
slow-timeout = { period = "120s", terminate-after = 3 }
test-threads = 4

# JUnit output for CI integration
final-status-level = "all"

[profile.default.junit]
path = "target/nextest/junit.xml"
store-success-output = true
store-failure-output = true

[profile.ci.junit]
path = "target/nextest/ci-junit.xml"
store-success-output = false
store-failure-output = true

# Override settings for specific tests
[[profile.default.overrides]]
# Long-running integration tests
filter = 'test(integration)'
slow-timeout = { period = "300s" }
threads-required = 1

[[profile.default.overrides]]
# GPU tests (when available)
filter = 'test(gpu)'
slow-timeout = { period = "180s" }
threads-required = 1

[[profile.default.overrides]]
# Large dataset tests
filter = 'test(large_dataset)'
slow-timeout = { period = "600s" }
threads-required = 2

[[profile.default.overrides]]
# Property-based tests
filter = 'test(property_)'
slow-timeout = { period = "300s" }

[[profile.default.overrides]]
# Stress tests
filter = 'test(stress_)'
slow-timeout = { period = "600s" }
threads-required = 2
