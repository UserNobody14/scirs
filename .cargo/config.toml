# Platform-specific configuration
# Note: OpenBLAS dependencies removed - using pure Rust OxiBLAS for BLAS/LAPACK operations

# Linux: CUDA configuration (for GPU crates)
[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-L", "/usr/local/cuda/targets/x86_64-linux/lib",
    "-L", "/usr/local/cuda/lib64"
]

# iOS targets
[target.aarch64-apple-ios]
rustflags = ["-C", "link-arg=-fembed-bitcode"]

[target.aarch64-apple-ios-sim]
rustflags = ["-C", "link-arg=-fembed-bitcode"]

[target.x86_64-apple-ios]
rustflags = ["-C", "link-arg=-fembed-bitcode"]

# Android targets
[target.aarch64-linux-android]
ar = "aarch64-linux-android-ar"
linker = "aarch64-linux-android-clang"
rustflags = ["-C", "link-arg=-lm"]

[target.armv7-linux-androideabi]
ar = "armv7a-linux-androideabi-ar"
linker = "armv7a-linux-androideabi-clang"
rustflags = ["-C", "link-arg=-lm", "-C", "link-arg=-latomic"]

[target.i686-linux-android]
ar = "i686-linux-android-ar"
linker = "i686-linux-android-clang"
rustflags = ["-C", "link-arg=-lm"]

[target.x86_64-linux-android]
ar = "x86_64-linux-android-ar"
linker = "x86_64-linux-android-clang"
rustflags = ["-C", "link-arg=-lm"]
